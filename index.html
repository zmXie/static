<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>静默之森 - 静态工具集</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-gradient: linear-gradient(135deg, #4f39bd 0%, #1e1b4b 100%);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            min-height: 100vh;
            background: var(--bg-gradient);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .background-blob {
            position: fixed;
            z-index: -1;
            width: 500px;
            height: 500px;
            background: var(--primary);
            filter: blur(150px);
            opacity: 0.2;
            border-radius: 50%;
            top: -100px;
            right: -100px;
            animation: float 20s infinite alternate;
        }

        @keyframes float {
            from {
                transform: translate(0, 0);
            }

            to {
                transform: translate(-100px, 100px);
            }
        }

        header {
            text-align: center;
            margin-bottom: 60px;
            max-width: 600px;
        }

        h1 {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
            letter-spacing: -0.02em;
        }

        .subtitle {
            font-size: 18px;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px;
            width: 100%;
            max-width: 1000px;
        }

        .tool-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 32px;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .tool-card:hover {
            transform: translateY(-8px);
            border-color: rgba(99, 102, 241, 0.5);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.3);
        }

        .tool-icon {
            width: 56px;
            height: 56px;
            background: rgba(99, 102, 241, 0.2);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
        }

        .tool-info h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .tool-info p {
            color: var(--text-muted);
            font-size: 15px;
            line-height: 1.5;
        }

        .card-footer {
            margin-top: auto;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            color: var(--primary);
            font-size: 14px;
        }

        footer {
            margin-top: 80px;
            color: var(--text-muted);
            font-size: 14px;
        }

        @media (max-width: 640px) {
            h1 {
                font-size: 36px;
            }

            .tools-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="background-blob"></div>

    <header>
        <h1>静态工具集</h1>
        <p class="subtitle">极简、高效的纯前端工具库，无服务器交互，隐私安全。</p>
    </header>

    <main class="tools-grid">
        <a href="what-to-eat.html" class="tool-card">
            <div class="tool-icon">
                <i data-lucide="utensils"></i>
            </div>
            <div class="tool-info">
                <h2>今天吃什么</h2>
                <p>还在纠结午餐？转动转盘，让命运决定你的下一顿美食。支持自定义食物列表。</p>
            </div>
            <div class="card-footer">
                立即使用 <i data-lucide="arrow-right" size="16"></i>
            </div>
        </a>

        <a href="word2html.html" class="tool-card">
            <div class="tool-icon">
                <i data-lucide="file-text"></i>
            </div>
            <div class="tool-info">
                <h2>文档转换助手</h2>
                <p>快速将 Word (.docx) 文档转换为干净的 HTML 代码。保留基本格式，支持实时预览。</p>
            </div>
            <div class="card-footer">
                立即使用 <i data-lucide="arrow-right" size="16"></i>
            </div>
        </a>
    </main>

    <script>
        lucide.createIcons();
    </script>
</body>

</html>
